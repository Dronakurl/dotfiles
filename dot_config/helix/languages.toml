# [language-server.hunspell-lsp]
# command = "/home/konrad/.cargo/bin/hunspell-lsp"

[language-server.harper-ls]
command = "/home/konrad/.cargo/bin/harper-ls"
args = ["--stdio"]

[language-server.harper-ls.config.harper-ls]
# Delay diagnostics by 1 second (1000ms) after typing stops
# This prevents diagnostics from appearing while you're actively typing
diagnosticDelayMs = 1000

[[language]]
name = "typst"
auto-format = true
language-servers = ["tinymist", "harper-ls"]
# language-servers = ["tinymist"]

[[language]]
name = "markdown"
scope = "source.md"
file-types = ["md", "markdown", "mdown"]
language-servers = ["harper-ls"]

[[language]]
name = "python"
scope = "source.python"
auto-format = true
language-servers = ["basedpyright", "ruff", "ty"]
formatter = { command = "bash", args = [
  "-c",
  "ruff check --select I --fix - | ruff format - ",
] }

[language-server.pyright.config.python.analysis]
typeCheckingMode = "basic"

[language-server.basedpyright.analysis]
typeCheckingMode = "basic"

[language-server.ty]
command = "ty"
args = ["server"]

[language-server.ruff.config.settings]
args = ["--ignore", "E501"]

[[language]]
name = "toml"
auto-format = true
language-servers = ["taplo"]
formatter = { command = "taplo", args = ["fmt", "-"] }

[[language]]
name = "docker-compose"
file-types = ["docker-compose"]
auto-format = true
formatter = { command = "bash", args = ["-c", " prettier --parser yaml"] }

[[language]]
name = "html"
file-types = ["html", "xml"]
auto-format = true
formatter = { command = "bash", args = [
  "-c",
  "prettier --stdin-filepath xx.html ",
] }

[[language]]
name = "lua"
file-types = ["lua"]
auto-format = true
language-servers = ["luals"]

[[language]]
name = "bash"
auto-format = true
language-servers = ["bash-language-server"]

[[language]]
name = "typescript"
auto-format = true
language-servers = ["typescript-language-server"]

# [[language]]
# name = "rust"
# auto-format = true
# language-servers = ["rust-analyzer"]

[[language]]
name = "javascript"
auto-format = true
language-servers = ["typescript-language-server"]

