# theme = "tokyonight_moon"
theme = "kanagawa"
# theme = "catppuccin_mocha"
# theme = "github_dark_dimmed"
# theme = "bogster"
# theme = "monokai"

[editor]
# insecure = true
line-number = "relative"
bufferline = "always"
gutters = ["diagnostics", "line-numbers", "diff"]
auto-format = true
true-color = true
color-modes = true
idle-timeout = 150
# crompletion-timeout = 100
# end-of-line-diagnostics = "error"

[editor.lsp]
display-inlay-hints = false
goto-reference-include-declaration = false

[editor.auto-save]
focus-lost = true
after-delay.enable = true

# [editor.inline-diagnostics]
# cursor-line = "disable"
# other-lines = "error"

[editor.soft-wrap]
enable = true

[editor.file-picker]
git-ignore = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "block"

[editor.indent-guides]
render = true
character = "▏" # Some characters that work well: "▏", "┆", "┊", "⸽"
skip-levels = 2

[editor.statusline]
left = ["mode", "spinner", "version-control"]
center = ["file-name"]
right = [
  "register",
  "diagnostics",
  "position",
  "position-percentage",
  "file-type",
  "read-only-indicator",
]
separator = "│"
mode.normal = "N"
mode.insert = "I"
mode.select = "S"

[editor.whitespace.render]
space = "none"
tab = "all"
nbsp = "none"
nnbsp = "none"
newline = "none"

[editor.whitespace.characters]
space = "·"
nbsp = "⍽"
nnbsp = "␣"
tab = "→"
newline = "⏎"
tabpad = "·"  # Tabs will look like "→···" (depending on tab width)

[keys.normal.space]
"m" = ":buffer-close"
" " = "file_picker_in_current_buffer_directory"
"," = "buffer_picker"
"l" = "goto_last_accessed_file"
"q" = ":write-quit-all"
# "z" = ":open ~/notes/notes.md"
"z" = [
  ":write",
  ":insert-output chezmoi apply ~/.config/helix",
  ":config-reload",
  ":open ~/.local/share/chezmoi/dot_config/helix/config.toml",
]
"." = [
  ':sh rm -f /tmp/unique-file',
  ':sh rm -f /tmp/unique-cwd-file',
  ":insert-output yazi --chooser-file=/tmp/unique-file --cwd-file=/tmp/unique-cwd-file",
  ':insert-output echo "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ':open %sh{cat /tmp/unique-file}',
  ':cd %sh{cat /tmp/unique-cwd-file}',
  ':redraw',
]

[keys.normal]
C-r = "redo"
C-g = [":new", ":insert-output lazygit", ":buffer-close!", ":redraw"]
"+" = "switch_to_uppercase"
"A-+" = "switch_to_lowercase"
"G" = "goto_last_line"
"A-h" = "goto_previous_buffer"
"A-l" = "goto_next_buffer"
"0" = "extend_to_line_start"
"$" = "extend_to_line_end"
V = ["select_mode", "extend_to_line_bounds"]
"_" = "extend_to_first_nonwhitespace"
# move lines up and down
A-j = ["extend_to_line_bounds", "delete_selection", "paste_after"]
A-k = [
  "extend_to_line_bounds",
  "delete_selection",
  "move_line_up",
  "paste_before",
]
D = ["ensure_selections_forward", "extend_to_line_end", "delete_selection"]
X = ["extend_line_above"]
esc = ["collapse_selection", "keep_primary_selection"]
C-space = ["expand_selection"]
A-m = "flip_selections"
C-h = "select_prev_sibling"
C-j = "shrink_selection"
C-k = "expand_selection"
C-l = "select_next_sibling"
"{" = ["goto_prev_paragraph", "collapse_selection"]
"}" = ["goto_next_paragraph", "collapse_selection"]

# Search for word under cursor
# "*" = [
#   "move_char_right",
#   "move_prev_word_start",
#   "move_next_word_end",
#   "search_selection",
#   "search_next",
# ]
# "#" = [
#   "move_char_right",
#   "move_prev_word_start",
#   "move_next_word_end",
#   "search_selection",
#   "search_prev",
# ]

A-R = "rotate_selection_contents_forward"

# Y = ["yank_main_selection_to_clipboard"]

[keys.normal.g]
o = "add_newline_below"
O = "add_newline_above"
q = ":reflow"

[keys.select]
X = ["extend_line_above"]
